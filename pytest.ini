[pytest]
# Permite importar os modulos de src/ direto nos testes (ex: from caso1_tipografico import ...)
pythonpath = src

# Categorias de teste (markers) - um por caso de deduplicacao
markers =
    caso1: Caso 1 - diferencas tipograficas (acentos/apostrofo)
    caso2: Caso 2 - sobrenome + iniciais dos nomes
    caso3: Caso 3 - particulas "de" e pontos opcionais
    caso4: Caso 4 - iniciais agrupadas + sobrenome
    caso5: Caso 5 - IDs diferentes para o mesmo autor
